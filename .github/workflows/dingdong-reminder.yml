name: Dingdong Member Day Reminder

on:
  schedule:
    # Every Tuesday and Friday at 10:00 Beijing time = 02:00 UTC
    - cron: '0 2 * * 2,5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Dingdong reminder
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          set -euo pipefail

          if [ -z "${FEISHU_WEBHOOK:-}" ]; then
            echo "FEISHU_WEBHOOK secret is not configured."
            exit 1
          fi

          cat > payload.json <<'JSON'
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "template": "green",
                "title": {
                  "tag": "plain_text",
                  "content": "叮咚买菜会员日提醒"
                }
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**今天是叮咚买菜会员日。**\n\n记得去叮咚买菜下单，会员日专享优惠别错过。"
                  }
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "note",
                  "elements": [
                    {
                      "tag": "plain_text",
                      "content": "叮咚买菜 App -> 会员中心 -> 会员日专区"
                    }
                  ]
                }
              ]
            }
          }
          JSON

          curl --fail --silent --show-error \
            -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json" \
            --data @payload.json
